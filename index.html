<!doctype html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>أدوات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@300;400;600&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #f6f0e6;
      --paper: #fff7ee;
      --ink: #1a1a1a;
      --muted: #5b5b5b;
      --line: #e6d8c8;
      --accent: #b1321e;
      --accent2: #0f766e;
      --shadow: 0 18px 55px rgba(0, 0, 0, .12);
      --radius: 18px;
    }

    * {
      box-sizing: border-box
    }

    html,
    body {
      height: 100%
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(1200px 900px at 18% -10%, rgba(177, 50, 30, .10), transparent 60%),
        radial-gradient(900px 700px at 95% 8%, rgba(15, 118, 110, .10), transparent 55%),
        repeating-linear-gradient(135deg, rgba(0, 0, 0, .03) 0 1px, transparent 1px 10px),
        var(--bg);
      font-family: 'IBM Plex Sans Arabic', ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
      line-height: 1.55;
    }

    a {
      color: inherit
    }

    code,
    kbd,
    pre {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 18px 70px
    }

    header {
      display: flex;
      gap: 16px;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap
    }

    .title {
      display: flex;
      flex-direction: column;
      gap: 8px
    }

    h1 {
      margin: 0;
      font-family: Amiri, serif;
      font-weight: 700;
      font-size: 34px;
      letter-spacing: .2px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-top: 18px
    }

    .card {
      background: linear-gradient(180deg, rgba(255, 255, 255, .92), rgba(255, 255, 255, .72));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card .body {
      padding: 16px
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .55);
      border-radius: 999px;
      box-shadow: 0 8px 22px rgba(0, 0, 0, .06);
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
    }

    .tool {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 14px 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, .55);
    }

    .tool_title {
      font-family: Amiri, serif;
      font-size: 20px;
      font-weight: 700;
      margin: 0
    }

    .tool_title a {
      text-decoration: none
    }

    .tool_title a:hover {
      text-decoration: underline
    }

    .tool_desc {
      margin: 0;
      color: var(--muted)
    }

    .tool_meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div class="title">
        <h1>أدوات</h1>
      </div>
    </header>

    <div class="grid">
      <section class="card">
        <div class="body">
          <div class="tool">
            <h2 class="tool_title"><a href="bok-to-epub.html">تحويل كتب الشاملة القديمة (.bok) إلى EPUB</a></h2>
            <p class="tool_desc">قراءة ملف BOK (MDB) وتحويله إلى EPUB مع دعم اختيار الجداول/الأعمدة يدويًا عند الحاجة.
            </p>
            <div class="tool_meta">
              <span class="pill">Client-side</span>
              <span class="pill">EPUB 3</span>
              <span class="pill">RTL</span>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>
</body>

</html>
